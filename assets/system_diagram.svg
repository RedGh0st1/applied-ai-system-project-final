<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 875" width="1000" height="875" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="1000" height="875" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">ToneMatch AI — System Diagram</text>

  <!-- Lane dividers -->
  <line x1="335" y1="52" x2="335" y2="848" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="623" y1="52" x2="623" y2="848" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Column headers -->
  <text x="252" y="56" text-anchor="middle" font-size="11" font-weight="bold" fill="#4361ee">① Profile-Based Path</text>
  <text x="482" y="56" text-anchor="middle" font-size="11" font-weight="bold" fill="#7209b7">② NL Query RAG Path</text>
  <text x="764" y="56" text-anchor="middle" font-size="11" font-weight="bold" fill="#e63946">③ Planner Path</text>

  <defs>
    <marker id="a-blue"   markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4361ee"/></marker>
    <marker id="a-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7209b7"/></marker>
    <marker id="a-coral"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e76f51"/></marker>
    <marker id="a-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f77f00"/></marker>
    <marker id="a-green"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2d6a4f"/></marker>
    <marker id="a-teal"   markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0077b6"/></marker>
    <marker id="a-red"    markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e63946"/></marker>
    <marker id="a-olive"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#606c38"/></marker>
  </defs>

  <!-- ══════════════ INPUT ROW (y=68) ══════════════ -->

  <rect x="168" y="68" width="168" height="56" rx="10" fill="#4361ee" stroke="#3a0ca3" stroke-width="1.5"/>
  <text x="252" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="white">User Profile</text>
  <text x="252" y="110" text-anchor="middle" font-size="10" fill="#c8d0ff">genre · mood · energy prefs</text>

  <rect x="348" y="68" width="268" height="56" rx="10" fill="#4361ee" stroke="#3a0ca3" stroke-width="1.5"/>
  <text x="482" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="white">User Query</text>
  <text x="482" y="110" text-anchor="middle" font-size="10" fill="#c8d0ff">"upbeat songs for gym"</text>

  <rect x="638" y="68" width="252" height="56" rx="10" fill="#4361ee" stroke="#3a0ca3" stroke-width="1.5"/>
  <text x="764" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Occasion</text>
  <text x="764" y="110" text-anchor="middle" font-size="10" fill="#c8d0ff">"wedding · late-night study"</text>

  <!-- ══════════════ CLASSIFY (y=184) — Col 2 only ══════════════ -->

  <rect x="348" y="184" width="268" height="58" rx="10" fill="#7209b7" stroke="#560bad" stroke-width="1.5"/>
  <text x="482" y="207" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Intent Classifier</text>
  <text x="482" y="225" text-anchor="middle" font-size="11" fill="#e0c3fc">classify_query_intent()</text>
  <text x="482" y="239" text-anchor="middle" font-size="10" fill="#e0c3fc">Claude Haiku · fast model</text>

  <!-- ══════════════ INPUT GUARDRAIL (y=278) — Col 2 only ══════════════ -->

  <rect x="348" y="278" width="268" height="58" rx="10" fill="#e76f51" stroke="#bf4e30" stroke-width="1.5"/>
  <text x="482" y="301" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Input Guardrail</text>
  <text x="482" y="319" text-anchor="middle" font-size="11" fill="#fff0eb">validate_query_safety()</text>
  <text x="482" y="333" text-anchor="middle" font-size="10" fill="#fff0eb">Claude Haiku · blocks unsafe queries</text>

  <!-- ══════════════ RETRIEVE ROW (y=372) ══════════════ -->

  <!-- Song Catalog shared data store -->
  <rect x="10" y="378" width="130" height="62" rx="10" fill="#2d6a4f" stroke="#1b4332" stroke-width="1.5"/>
  <text x="75" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Song Catalog</text>
  <text x="75" y="418" text-anchor="middle" font-size="10" fill="#b7e4c7">data/songs.csv</text>
  <text x="75" y="432" text-anchor="middle" font-size="10" fill="#b7e4c7">25+ attrs/song</text>

  <!-- Col 1: Scoring Engine -->
  <rect x="168" y="372" width="168" height="72" rx="10" fill="#f77f00" stroke="#d62828" stroke-width="1.5"/>
  <text x="252" y="396" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Scoring Engine</text>
  <text x="252" y="414" text-anchor="middle" font-size="11" fill="#fff3e0">recommend_with_strategy()</text>
  <text x="252" y="430" text-anchor="middle" font-size="10" fill="#fff3e0">5 ranking strategies</text>

  <!-- Col 2: Keyword Retriever -->
  <rect x="348" y="372" width="268" height="72" rx="10" fill="#f77f00" stroke="#d62828" stroke-width="1.5"/>
  <text x="482" y="396" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Keyword Retriever</text>
  <text x="482" y="414" text-anchor="middle" font-size="11" fill="#fff3e0">retrieve_songs_for_query()</text>
  <text x="482" y="430" text-anchor="middle" font-size="10" fill="#fff3e0">offline · no API key needed</text>

  <!-- Col 3: Planner (reads catalog directly) -->
  <rect x="638" y="372" width="252" height="72" rx="10" fill="#e63946" stroke="#9d0208" stroke-width="1.5"/>
  <text x="764" y="396" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Planner</text>
  <text x="764" y="414" text-anchor="middle" font-size="11" fill="#ffe8e8">plan_playlist_for_occasion()</text>
  <text x="764" y="430" text-anchor="middle" font-size="10" fill="#ffe8e8">Claude Sonnet · samples catalog[:40]</text>

  <!-- ══════════════ GENERATE ROW (y=502) — Col 1 and Col 2 ══════════════ -->

  <!-- Col 1: Response Generator -->
  <rect x="168" y="502" width="168" height="72" rx="10" fill="#0077b6" stroke="#023e8a" stroke-width="1.5"/>
  <text x="252" y="526" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Response Gen</text>
  <text x="252" y="544" text-anchor="middle" font-size="10" fill="#caf0f8">generate_recommendation</text>
  <text x="252" y="558" text-anchor="middle" font-size="10" fill="#caf0f8">_response() · Sonnet</text>

  <!-- Col 2: RAG Generator -->
  <rect x="348" y="502" width="268" height="72" rx="10" fill="#0077b6" stroke="#023e8a" stroke-width="1.5"/>
  <text x="482" y="526" text-anchor="middle" font-size="13" font-weight="bold" fill="white">RAG Generator</text>
  <text x="482" y="544" text-anchor="middle" font-size="11" fill="#caf0f8">rag_recommend() · generate step</text>
  <text x="482" y="558" text-anchor="middle" font-size="10" fill="#caf0f8">Claude Sonnet · grounded answer</text>

  <!-- ══════════════ OUTPUT GUARDRAIL (y=634) — Col 2 only ══════════════ -->

  <rect x="348" y="634" width="268" height="56" rx="10" fill="#e76f51" stroke="#bf4e30" stroke-width="1.5"/>
  <text x="482" y="657" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Output Guardrail</text>
  <text x="482" y="675" text-anchor="middle" font-size="10" fill="#fff0eb">validate_recommendation_relevance()</text>
  <text x="482" y="687" text-anchor="middle" font-size="10" fill="#fff0eb">Claude Haiku · scores 1–5</text>

  <!-- ══════════════ OUTPUT ROW (y=742) ══════════════ -->

  <rect x="138" y="742" width="228" height="52" rx="10" fill="#1a1a2e" stroke="#16213e" stroke-width="1.5"/>
  <text x="252" y="765" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Ranked Recommendations</text>
  <text x="252" y="781" text-anchor="middle" font-size="10" fill="#a8dadc">scored songs + AI narration</text>

  <rect x="360" y="742" width="244" height="52" rx="10" fill="#1a1a2e" stroke="#16213e" stroke-width="1.5"/>
  <text x="482" y="765" text-anchor="middle" font-size="12" font-weight="bold" fill="white">RAG Answer</text>
  <text x="482" y="781" text-anchor="middle" font-size="10" fill="#a8dadc">grounded · safety-validated</text>

  <rect x="645" y="742" width="245" height="52" rx="10" fill="#1a1a2e" stroke="#16213e" stroke-width="1.5"/>
  <text x="764" y="765" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Occasion Playlist Plan</text>
  <text x="764" y="781" text-anchor="middle" font-size="10" fill="#a8dadc">step-by-step energy arc</text>

  <!-- ══════════════ TESTING ROW (y=815) ══════════════ -->

  <rect x="40" y="815" width="185" height="52" rx="10" fill="#606c38" stroke="#283618" stroke-width="1.5"/>
  <text x="132" y="838" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Human Review</text>
  <text x="132" y="854" text-anchor="middle" font-size="10" fill="#dde5b6">inspect AI output quality</text>

  <rect x="775" y="815" width="185" height="52" rx="10" fill="#606c38" stroke="#283618" stroke-width="1.5"/>
  <text x="867" y="838" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Test Suite (pytest)</text>
  <text x="867" y="854" text-anchor="middle" font-size="10" fill="#dde5b6">test_ai_features.py · automated</text>

  <!-- ══════════════ ARROWS: main data flow ══════════════ -->

  <!-- Col 1: User Profile → Scoring Engine -->
  <line x1="252" y1="124" x2="252" y2="372" stroke="#4361ee" stroke-width="2" marker-end="url(#a-blue)"/>

  <!-- Col 1: Scoring Engine → Response Gen -->
  <line x1="252" y1="444" x2="252" y2="502" stroke="#f77f00" stroke-width="2" marker-end="url(#a-orange)"/>

  <!-- Col 1: Response Gen → Output -->
  <line x1="252" y1="574" x2="252" y2="742" stroke="#0077b6" stroke-width="2" marker-end="url(#a-teal)"/>

  <!-- Col 2: User Query → Intent Classifier -->
  <line x1="482" y1="124" x2="482" y2="184" stroke="#4361ee" stroke-width="2" marker-end="url(#a-blue)"/>

  <!-- Col 2: Intent Classifier → Input Guardrail -->
  <line x1="482" y1="242" x2="482" y2="278" stroke="#7209b7" stroke-width="2" marker-end="url(#a-purple)"/>

  <!-- Col 2: Input Guardrail → Keyword Retriever -->
  <line x1="482" y1="336" x2="482" y2="372" stroke="#e76f51" stroke-width="2" marker-end="url(#a-coral)"/>

  <!-- Col 2: Keyword Retriever → RAG Generator -->
  <line x1="482" y1="444" x2="482" y2="502" stroke="#f77f00" stroke-width="2" marker-end="url(#a-orange)"/>

  <!-- Col 2: RAG Generator → Output Guardrail -->
  <line x1="482" y1="574" x2="482" y2="634" stroke="#0077b6" stroke-width="2" marker-end="url(#a-teal)"/>

  <!-- Col 2: Output Guardrail → RAG Answer Output -->
  <line x1="482" y1="690" x2="482" y2="742" stroke="#e76f51" stroke-width="2" marker-end="url(#a-coral)"/>

  <!-- Col 3: Occasion → Planner (long vertical, skips classify/guardrail rows) -->
  <line x1="764" y1="124" x2="764" y2="372" stroke="#4361ee" stroke-width="2" marker-end="url(#a-blue)"/>

  <!-- Col 3: Planner → Occasion Playlist Output (long vertical) -->
  <line x1="764" y1="444" x2="764" y2="742" stroke="#e63946" stroke-width="2" marker-end="url(#a-red)"/>

  <!-- ══════════════ ARROWS: Song Catalog reads (dashed green) ══════════════ -->

  <!-- Song Catalog → Scoring Engine (short horizontal) -->
  <line x1="140" y1="409" x2="168" y2="409" stroke="#2d6a4f" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-green)"/>

  <!-- Song Catalog → Keyword Retriever (L-shaped, routed below retrieve boxes) -->
  <path d="M 75 440 L 75 462 L 340 462 L 340 408 L 348 408" fill="none" stroke="#2d6a4f" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-green)"/>

  <!-- ══════════════ ARROWS: monitoring / testing (dashed olive) ══════════════ -->

  <!-- Col 1 Output → Human Review -->
  <line x1="252" y1="794" x2="170" y2="815" stroke="#606c38" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a-olive)"/>

  <!-- Col 2 Output → Human Review -->
  <line x1="450" y1="794" x2="210" y2="815" stroke="#606c38" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a-olive)"/>

  <!-- Col 3 Output → Test Suite -->
  <line x1="764" y1="794" x2="840" y2="815" stroke="#606c38" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a-olive)"/>

  <!-- Col 2 Output → Test Suite -->
  <line x1="514" y1="794" x2="790" y2="815" stroke="#606c38" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a-olive)"/>

  <!-- ══════════════ LAYER LABELS (right side) ══════════════ -->
  <text x="978" y="100"  text-anchor="end" font-size="10" fill="#888" font-style="italic">INPUT</text>
  <text x="978" y="215"  text-anchor="end" font-size="10" fill="#888" font-style="italic">CLASSIFY</text>
  <text x="978" y="310"  text-anchor="end" font-size="10" fill="#888" font-style="italic">GUARDRAIL-IN</text>
  <text x="978" y="408"  text-anchor="end" font-size="10" fill="#888" font-style="italic">RETRIEVE</text>
  <text x="978" y="538"  text-anchor="end" font-size="10" fill="#888" font-style="italic">GENERATE</text>
  <text x="978" y="662"  text-anchor="end" font-size="10" fill="#888" font-style="italic">GUARDRAIL-OUT</text>
  <text x="978" y="768"  text-anchor="end" font-size="10" fill="#888" font-style="italic">OUTPUT</text>
  <text x="978" y="841"  text-anchor="end" font-size="10" fill="#888" font-style="italic">TEST</text>

  <!-- Legend -->
  <line x1="10"  y1="865" x2="40"  y2="865" stroke="#2d6a4f" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="46"  y="869" font-size="10" fill="#555">catalog read</text>
  <line x1="118" y1="865" x2="148" y2="865" stroke="#606c38" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="154" y="869" font-size="10" fill="#555">monitoring / test</text>
  <line x1="252" y1="865" x2="282" y2="865" stroke="#555" stroke-width="2"/>
  <text x="288" y="869" font-size="10" fill="#555">data / generation flow</text>

</svg>
